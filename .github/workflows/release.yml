name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 psutil requests py7zr pyinstaller Pillow
          
      - name: Build EXE
        run: |
          # Pillow is now installed, so PyInstaller can convert icon.png to .ico automatically
          pyinstaller --noconsole --onefile --name Argosy --icon "icon.png" --add-data "icon.png;." main.py
          
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Argosy.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
